<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COVER ART // SIGNAL TOOLS</title>
<link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #07090c;
    --panel: #0d1116;
    --line: #1b2530;
    --cyan: #2ee6e6;
    --red: #ff3b50;
    --dim: #6b7d8c;
    --text: #cdd9e1;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    padding: 28px 18px 80px;
    position: relative;
    overflow-x: hidden;
  }
  body::before {
    content: "";
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      to bottom, transparent 0, transparent 2px,
      rgba(46,230,230,0.025) 3px, rgba(46,230,230,0.025) 4px);
    pointer-events: none; z-index: 999;
  }
  .wrap { max-width: 760px; margin: 0 auto; }
  header { text-align: center; margin-bottom: 26px; }
  .eyebrow {
    font-size: 11px; letter-spacing: 4px; color: var(--dim);
    text-transform: uppercase;
  }
  h1 {
    font-family: 'Major Mono Display', monospace;
    font-size: clamp(26px, 7vw, 44px);
    color: var(--cyan); margin: 8px 0 6px;
    text-shadow: 2px 0 var(--red), -2px 0 rgba(46,230,230,0.4);
    animation: glitch 5s infinite steps(1);
  }
  @keyframes glitch {
    0%,92%,100% { text-shadow: 2px 0 var(--red), -2px 0 rgba(46,230,230,0.4); }
    93% { text-shadow: -3px 0 var(--red), 3px 0 var(--cyan); transform: translateX(1px); }
    95% { text-shadow: 3px 0 var(--cyan), -3px 0 var(--red); transform: translateX(-1px); }
  }
  .sub { color: var(--dim); font-size: 12px; letter-spacing: 1px; }
  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    padding: 20px; margin-bottom: 18px;
  }
  label {
    display: block; font-size: 11px; letter-spacing: 2px;
    text-transform: uppercase; color: var(--cyan); margin-bottom: 8px;
  }
  textarea, input, select {
    width: 100%; background: #05070a; border: 1px solid var(--line);
    color: var(--text); font-family: 'Space Mono', monospace;
    font-size: 14px; padding: 12px; resize: vertical;
  }
  textarea:focus, input:focus, select:focus {
    outline: none; border-color: var(--cyan);
  }
  textarea { min-height: 200px; }
  .row { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 16px; }
  .row > div { flex: 1; min-width: 180px; }
  .row label { margin-bottom: 6px; }
  button {
    font-family: 'Space Mono', monospace; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase; cursor: pointer;
    border: none; padding: 14px 22px; font-size: 13px;
  }
  .generate {
    width: 100%; background: var(--cyan); color: #05070a;
    margin-top: 20px; transition: 0.15s;
  }
  .generate:hover { background: #fff; }
  .generate:disabled { opacity: 0.4; cursor: wait; }
  .out-head {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 14px;
  }
  .copy { background: transparent; border: 1px solid var(--cyan); color: var(--cyan); padding: 8px 16px; }
  .copy:hover { background: var(--cyan); color: #05070a; }
  .result {
    white-space: pre-wrap; font-size: 14px; line-height: 1.6;
    color: var(--text); background: #05070a; border: 1px solid var(--line);
    padding: 18px; min-height: 80px;
  }
  .result.empty { color: var(--dim); font-style: italic; }
  .status { font-size: 11px; color: var(--dim); margin-top: 10px; min-height: 14px; }
  .err { color: var(--red); }
  .keybar { font-size: 11px; color: var(--dim); text-align: center; margin-bottom: 18px; }
  .keybar a { color: var(--cyan); cursor: pointer; text-decoration: underline; }
  details { margin-top: 12px; }
  summary { cursor: pointer; font-size: 11px; color: var(--dim); letter-spacing: 1px; }
  details input { margin-top: 10px; }
  .footer { text-align: center; color: var(--dim); font-size: 11px; letter-spacing: 2px; margin-top: 30px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Signal Tools</div>
    <h1>cover art</h1>
    <div class="sub">paste lyrics // get a cover prompt // feed to image model</div>
  </header>

  <div class="keybar">
    api status: <span id="keystat">checking…</span> ·
    <a id="setkey">set keys</a>
  </div>

  <div class="panel">
    <label for="lyrics">Song lyrics</label>
    <textarea id="lyrics" placeholder="Paste the full lyrics here…"></textarea>

    <div class="row">
      <div>
        <label for="title">Track / project title <span style="color:var(--dim)">(optional)</span></label>
        <input id="title" placeholder="e.g. Permafrost">
      </div>
      <div>
        <label for="style">Art direction</label>
        <select id="style">
          <option value="signal">Cryptid Static — dark glitch transmission</option>
          <option value="photo">Cinematic photographic</option>
          <option value="surreal">Surreal / dreamlike</option>
          <option value="minimal">Minimal / graphic</option>
          <option value="analog">Analog horror / decayed media</option>
          <option value="open">Let the model decide</option>
        </select>
      </div>
    </div>

    <div class="row">
      <div>
        <label for="aspect">Aspect</label>
        <select id="aspect">
          <option value="1:1 square album cover">1:1 square (album)</option>
          <option value="9:16 vertical">9:16 vertical (reels/TikTok)</option>
          <option value="16:9 wide">16:9 wide (header/banner)</option>
        </select>
      </div>
      <div>
        <label for="faceless">Faceless?</label>
        <select id="faceless">
          <option value="yes">Yes — no identifiable faces</option>
          <option value="no">Faces allowed</option>
        </select>
      </div>
    </div>

    <button class="generate" id="go">Generate prompt</button>
    <div class="status" id="status"></div>
  </div>

  <div class="panel">
    <div class="out-head">
      <label style="margin:0">Cover art prompt</label>
      <button class="copy" id="copy">Copy</button>
    </div>
    <div class="result empty" id="result">Prompt appears here. Copy it straight into ChatGPT / DALL·E / Midjourney.</div>
  </div>

  <div class="footer">// stay tuned //</div>
</div>

<script>
const LS_A = 'key_anthropic';
const LS_G = 'key_groq';

function getKeys(){ return { a: localStorage.getItem(LS_A)||'', g: localStorage.getItem(LS_G)||'' }; }
function refreshKeyStat(){
  const {a,g} = getKeys();
  const el = document.getElementById('keystat');
  if(a){ el.textContent='claude ready'; el.style.color='var(--cyan)'; }
  else if(g){ el.textContent='groq fallback ready'; el.style.color='var(--cyan)'; }
  else { el.textContent='no key set'; el.style.color='var(--red)'; }
}
document.getElementById('setkey').onclick = () => {
  const a = prompt('Anthropic API key (leave blank to keep / clear):', getKeys().a);
  if(a!==null) a ? localStorage.setItem(LS_A,a.trim()) : localStorage.removeItem(LS_A);
  const g = prompt('Groq API key (fallback, optional):', getKeys().g);
  if(g!==null) g ? localStorage.setItem(LS_G,g.trim()) : localStorage.removeItem(LS_G);
  refreshKeyStat();
};
refreshKeyStat();

const STYLE_NOTES = {
  signal: "Cryptid Static house aesthetic: dark glitch metal transmission. Near-black backgrounds, cyan and red accents, scanlines, signal interference, broken/degraded textures, anonymous figures (silhouetted, obscured, or frozen). Atmosphere of dread between who you were and who you're becoming. Avoid: coffee/cafe imagery, morning/A.M. imagery, literal robots or neon-cyberpunk cliche.",
  photo: "Cinematic photographic realism. Strong directional light, shallow depth of field, film grain, emotionally loaded single subject or scene.",
  surreal: "Surreal, dreamlike, impossible scale or physics. Symbolic rather than literal. Painterly or hyperreal hybrid.",
  minimal: "Minimal graphic design. Bold negative space, one dominant shape or symbol, restrained two-to-three color palette, strong typographic potential.",
  analog: "Analog horror / decayed media. VHS artifacts, tracking errors, scan lines, found-footage degradation, washed CRT color, unsettling stillness.",
  open: "Choose the art direction that best fits the emotional core of the lyrics."
};

function buildSystem(opts){
  return `You are an art director generating a single image-generation prompt for song cover art.
Read the lyrics and extract the dominant CONCRETE image, mood, and emotional core. Do NOT summarize the lyrics or quote them. Translate feeling into a physical scene.

Output ONLY the final prompt as one cohesive paragraph (no headers, no preamble, no markdown, no options, no explanation). It must be directly pasteable into an image model.

The prompt must specify: the central subject/scene, setting, lighting, color palette, mood, texture/medium, composition, and aspect ratio. End with the aspect ratio.

Art direction: ${STYLE_NOTES[opts.style]}
Aspect ratio: ${opts.aspect}.
${opts.faceless==='yes' ? 'FACELESS: no identifiable human faces — use silhouettes, backs of heads, obscured, cropped, or turned-away figures, or no figure at all.' : 'Faces are allowed.'}
${opts.title ? 'Leave clear negative space where a title could be placed; do not render any text or letters in the image.' : 'Do not render any text or letters in the image.'}
Keep it vivid but under 130 words.`;
}

async function callClaude(key, system, user){
  const r = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{ "Content-Type":"application/json", "x-api-key":key, "anthropic-version":"2023-06-01", "anthropic-dangerous-direct-browser-access":"true" },
    body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:1000, system, messages:[{role:"user",content:user}] })
  });
  if(!r.ok) throw new Error("Claude "+r.status+": "+(await r.text()).slice(0,160));
  const d = await r.json();
  return d.content.map(b=>b.text||"").join("").trim();
}

async function callGroq(key, system, user){
  const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
    method:"POST",
    headers:{ "Content-Type":"application/json", "Authorization":"Bearer "+key },
    body: JSON.stringify({ model:"llama-3.3-70b-versatile", max_tokens:1000, messages:[{role:"system",content:system},{role:"user",content:user}] })
  });
  if(!r.ok) throw new Error("Groq "+r.status+": "+(await r.text()).slice(0,160));
  const d = await r.json();
  return d.choices[0].message.content.trim();
}

document.getElementById('go').onclick = async () => {
  const lyrics = document.getElementById('lyrics').value.trim();
  const status = document.getElementById('status');
  const result = document.getElementById('result');
  if(!lyrics){ status.innerHTML = '<span class="err">Paste lyrics first.</span>'; return; }
  const {a,g} = getKeys();
  if(!a && !g){ status.innerHTML = '<span class="err">Set an API key first (link up top).</span>'; return; }

  const opts = {
    title: document.getElementById('title').value.trim(),
    style: document.getElementById('style').value,
    aspect: document.getElementById('aspect').value,
    faceless: document.getElementById('faceless').value
  };
  const system = buildSystem(opts);
  const user = (opts.title ? `Track title: ${opts.title}\n\n` : '') + `Lyrics:\n${lyrics}`;

  const btn = document.getElementById('go');
  btn.disabled = true; status.textContent = 'transmitting…'; result.classList.remove('err');

  try {
    let out;
    if(a){ try { out = await callClaude(a, system, user); } catch(e){ if(g){ status.textContent='claude failed, trying groq…'; out = await callGroq(g, system, user); } else throw e; } }
    else { out = await callGroq(g, system, user); }
    result.textContent = out;
    result.classList.remove('empty');
    status.textContent = 'done · '+out.split(/\s+/).length+' words';
  } catch(e){
    status.innerHTML = '<span class="err">'+e.message+'</span>';
  } finally { btn.disabled = false; }
};

document.getElementById('copy').onclick = () => {
  const t = document.getElementById('result').textContent;
  if(!t || document.getElementById('result').classList.contains('empty')) return;
  navigator.clipboard.writeText(t).then(()=>{
    const b = document.getElementById('copy'); const o=b.textContent;
    b.textContent='Copied'; setTimeout(()=>b.textContent=o,1200);
  });
};
</script>
</body>
</html>
